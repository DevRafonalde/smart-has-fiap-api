# ─────────────────────────────────────────────────────────────
# SmartHAS — Digital 360
# Configuração principal da API Spring Boot 3
# ─────────────────────────────────────────────────────────────

spring:
  application:
    name: smarthas-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ── Banco de Dados ────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smarthas}
    username: ${DB_USER:smarthas}
    password: ${DB_PASSWORD:smarthas123}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SmartHAS-HikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ───────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate           # Flyway gerencia o schema — nunca use create/update em prod
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: America/Sao_Paulo

  # ── Flyway (migrations) ───────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ── Redis (cache + sessões) ───────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis123}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  # ── RabbitMQ (notificações assíncronas) ───────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:smarthas}
    password: ${RABBITMQ_PASSWORD:rabbitmq123}
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 3000ms
          max-attempts: 3
          multiplier: 2.0

  # ── Cache ─────────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 3600000       # 1 hora (ms) — padrão global
      cache-null-values: false

  # ── Serialização JSON ─────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: America/Sao_Paulo

# ── Servidor ──────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html
    min-response-size: 1024
  error:
    include-message: always
    include-binding-errors: always

# ── Segurança JWT ─────────────────────────────────────────────
security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-256-bits-secret}
    expiration: ${JWT_EXPIRATION:900}          # 15 minutos (segundos)
    refresh-expiration: ${JWT_REFRESH:604800}  # 7 dias (segundos)

# ── RabbitMQ — Filas e Exchanges ──────────────────────────────
smarthas:
  rabbitmq:
    exchange: smarthas.exchange
    queues:
      notification: smarthas.notification.queue
      email: smarthas.email.queue
      push: smarthas.push.queue

  # Regras de negócio configuráveis (RNs do projeto)
  rules:
    assessment:
      min-score: 70               # RN03: score mínimo para aprovação
      max-attempts: 3             # RN03: tentativas antes de acionar tutoria
    tutor:
      max-simultaneous-sessions: 3  # RN10: limite de sessões por tutor
      sla-hours: 24                 # RN05: SLA de matching em horas
    guide:
      cache-ttl-hours: 24           # TTL do cache das APIs gov.br
    lgpd:
      deletion-deadline-hours: 72   # RN08: prazo de exclusão de dados

# ── Actuator / Observabilidade ────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: SmartHAS — Digital 360
    description: Plataforma de Inclusão Digital Comunitária
    version: 1.0.0-SNAPSHOT

# ── Springdoc / Swagger ───────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  info:
    title: SmartHAS API
    description: API REST da Plataforma Digital 360 — Inclusão Digital Comunitária
    version: v1

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    root: INFO
    br.com.smarthas: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

---
# ─────────────────────────────────────────────────────────────
# Perfil: DEV
# ─────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

logging:
  level:
    br.com.smarthas: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  swagger-ui:
    enabled: true

---
# ─────────────────────────────────────────────────────────────
# Perfil: PROD
# ─────────────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate

logging:
  level:
    root: WARN
    br.com.smarthas: INFO

springdoc:
  swagger-ui:
    enabled: false    # desabilita Swagger em produção